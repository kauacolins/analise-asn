services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
  web:
    image: node:22-alpine
    working_dir: /app/apps/web
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
